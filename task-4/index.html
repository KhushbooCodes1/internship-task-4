<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Responsive Image Gallery</h1>
      <p>Hover on images to see effect</p>
    </header>

    <section class="gallery">
      <div class="image-card">
        <img src="images/img1.jpg" />
        <div class="overlay">Nature</div>
      </div>

      <div class="image-card">
        <img src="images/img2.jpg" />
        <div class="overlay">Mountain</div>
      </div>

      <div class="image-card">
        <img src="images/img3.jpg" />
        <div class="overlay">Beach</div>
      </div>

      <div class="image-card">
        <img src="images/img4.jpg" />
        <div class="overlay">Forest</div>
      </div>

      <div class="image-card">
        <img src="images/img5.jpg" />
        <div class="overlay">City</div>
      </div>

      <div class="image-card">
        <img src="images/img6.jpg" />
        <div class="overlay">Sunset</div>
      </div>

      <div class="image-card">
        <img src="images/img7.jpg" />
        <div class="overlay">Animal</div>
      </div>

      <div class="image-card">
        <img src="images/img8.jpg" />
        <div class="overlay">Fruit</div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
